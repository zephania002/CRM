<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniConnect | CRM Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">OmniConnect</div>
            <nav>
                <a href="#" class="active">📊 Dashboard</a>
                <a href="#">👥 Customers</a>
                <a href="#">💬 WhatsApp</a>
                <a href="#">⚙️ Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>Customer Dashboard</h1>
                <div class="user-profile">Admin User</div>
            </header>

            <div class="dashboard-grid">
                <section class="card form-section">
                    <h3>Add New Customer</h3>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="e.g. John Doe">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="phone" placeholder="e.g. +254 700 000000">
                    </div>
                    <button class="btn-primary" onclick="addCustomer()">Add to Database</button>
                </section>

                <section class="card stats-section">
                    <h3>Quick Stats</h3>
                    <div class="stat-item">
                        <span>Total Leads</span>
                        <strong id="totalCount">0</strong>
                    </div>
                </section>

                <section class="card table-section">
                    <h3>All Customers</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="customerList">
                                </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
